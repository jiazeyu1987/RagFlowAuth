services:
  onlyoffice:
    image: onlyoffice/documentserver:latest
    profiles: ["onlyoffice"]
    ports:
      - "8082:80"
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: "${ONLYOFFICE_JWT_SECRET:-change-me-onlyoffice-secret}"
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_logs:/var/log/onlyoffice
      - onlyoffice_lib:/var/lib/onlyoffice

  backend:
    image: ragflowauth-backend:${RAGFLOWAUTH_TAG:-local}
    ports:
      - "8001:8001"
    volumes:
      - ../data:/app/data
      - ../backups:/app/data/backups
      - ../ragflow_config.json:/app/ragflow_config.json:ro
    environment:
      HOST: "0.0.0.0"
      PORT: "8001"
      DATABASE_PATH: "data/auth.db"
      UPLOAD_DIR: "data/uploads"
      # IMPORTANT: change in production
      JWT_SECRET_KEY: "${JWT_SECRET_KEY:-change-me-in-production}"
      ONLYOFFICE_ENABLED: "${ONLYOFFICE_ENABLED:-false}"
      ONLYOFFICE_SERVER_URL: "${ONLYOFFICE_SERVER_URL:-http://localhost:8082}"
      ONLYOFFICE_JWT_SECRET: "${ONLYOFFICE_JWT_SECRET:-change-me-onlyoffice-secret}"
      ONLYOFFICE_PUBLIC_API_BASE_URL: "${ONLYOFFICE_PUBLIC_API_BASE_URL:-http://localhost:8001}"
      ONLYOFFICE_FILE_TOKEN_TTL_SECONDS: "${ONLYOFFICE_FILE_TOKEN_TTL_SECONDS:-300}"
      ONLYOFFICE_FILE_TOKEN_SECRET: "${ONLYOFFICE_FILE_TOKEN_SECRET:-}"

  frontend:
    image: ragflowauth-frontend:${RAGFLOWAUTH_TAG:-local}
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  onlyoffice_data:
  onlyoffice_logs:
  onlyoffice_lib:
