      function buildHeader(table) {
        const thead = document.createElement("thead");
        const tr1 = document.createElement("tr");
        const tr2 = document.createElement("tr");

        const addTh = (tr, text, attrs = {}) => {
          const th = document.createElement("th");
          th.textContent = text;
          Object.entries(attrs).forEach(([k, v]) => th.setAttribute(k, String(v)));
          tr.appendChild(th);
          return th;
        };

        addTh(tr1, "文件大类", { rowspan: 2 });
        addTh(tr1, "文件小类", { rowspan: 2 });
        addTh(tr1, "编制", { rowspan: 2 });
        addTh(tr1, "审核会签", { colspan: COLS_SIGNOFF.length });
        addTh(tr1, "标准化审核", { colspan: 1 });
        addTh(tr1, "批准", { rowspan: 2 });
        addTh(tr1, "备注", { rowspan: 2 });

        COLS_SIGNOFF.forEach((c) => addTh(tr2, c.label));
        addTh(tr2, COL_DOC_ADMIN.label);

        thead.appendChild(tr1);
        thead.appendChild(tr2);
        table.appendChild(thead);
      }

      function renderCombinedTable(categories) {
        const table = document.createElement("table");
        buildHeader(table);

        const tbody = document.createElement("tbody");

        categories.forEach((category) => {
          const rows = DATA[category] ?? [];

          rows.forEach((row, index) => {
            const tr = document.createElement("tr");

            const marks = { ...(row.marks ?? {}), directManager: "●", docAdmin: "●" };

            const td = (text, className = "") => {
              const cell = document.createElement("td");
              if (className) cell.className = className;
              cell.textContent = text ?? "";
              return cell;
            };

            if (index === 0) {
              const catCell = td(category, "center");
              catCell.setAttribute("rowspan", String(rows.length));
              tr.appendChild(catCell);
            }

            tr.appendChild(td(row.file, "doc-name"));
            tr.appendChild(td(row.compiler, "compiler"));

            COLS_SIGNOFF.forEach((c) => {
              const mark = marks[c.key] ?? "";
              tr.appendChild(td(mark, mark ? "dot" : "center"));
            });

            const docAdminMark = marks[COL_DOC_ADMIN.key] ?? "";
            tr.appendChild(td(docAdminMark, docAdminMark ? "dot" : "center"));

            tr.appendChild(td(row.approver ?? "", "approver"));
            tr.appendChild(td(row.remark ?? "", "remark"));

            tbody.appendChild(tr);
          });
        });

        table.appendChild(tbody);
        return table;
      }

      const tablesRoot = document.getElementById("tables");
