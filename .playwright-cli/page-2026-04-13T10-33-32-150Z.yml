                - list [ref=e7343]:
                  - listitem [ref=e7344]: The patient has a chronic progressive renal disease (nephrotic syndrome) over 6+ years.
                  - listitem [ref=e7345]: Initial response to steroid therapy (prednisone) was favorable (proteinuria decreased from 3.55g to 2g/24h), but relapse occurred in 2018 with worsening proteinuria and edema.
                  - listitem [ref=e7346]: Cyclophosphamide (CTX) was used multiple times for immunosuppression, accumulating to 6.8g total dose.
                  - listitem [ref=e7347]: Addition of cyclosporine was discontinued due to side effects.
                  - listitem [ref=e7348]: In 2022, proteinuria and creatinine rose significantly, indicating declining renal function.
                  - listitem [ref=e7349]: Introduction of tacrolimus led to further creatinine elevation, prompting discontinuation.
                  - listitem [ref=e7350]: By early 2023, the patient showed severe proteinuria (10g/d), hypoalbuminemia (25g/L), and markedly elevated creatinine (311umol/L), suggesting advanced kidney dysfunction.
