resolver 127.0.0.11 valid=30s ipv6=off;

# Keep a shared upstream pool so frontend workers can reuse backend connections
# and avoid high-concurrency local port exhaustion.
upstream ragflowauth_backend {
  zone ragflowauth_backend 64k;
  server ragflowauth-backend:8001 resolve;
  keepalive 256;
}

server {
  listen 80;
  server_name _;

  # No upload size limit
  client_max_body_size 0;

  # Ensure ES module scripts are served with correct MIME type (e.g. pdf.worker.min.mjs)
  location ~* \\.mjs$ {
    default_type application/javascript;
    try_files $uri =404;
  }

  # Frontend SPA
  root /usr/share/nginx/html;
  index index.html;

  # Reverse proxy to backend (same-origin, no CORS hassle)
  location /api/ {
    proxy_pass http://ragflowauth_backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 3s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
  }

  location /health {
    proxy_pass http://ragflowauth_backend/health;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_connect_timeout 3s;
    proxy_read_timeout 10s;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
